name: Captura
options:
  minimumXcodeVersion: "14.0"
  deploymentTarget:
    macOS: "13.0"
  bundleIdPrefix: com.captura

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO

targets:
  Captura:
    type: application
    platform: macOS
    sources:
      - path: Captura
        excludes:
          - "*.entitlements"
    info:
      path: Captura/Info.plist
      properties:
        CFBundleName: Captura
        CFBundleDisplayName: Captura
        CFBundleIdentifier: com.captura.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        CFBundlePackageType: APPL
        LSUIElement: true
        LSMinimumSystemVersion: "13.0"
        NSScreenCaptureUsageDescription: "Captura needs screen recording permission to take screenshots."
        NSPrincipalClass: NSApplication
    entitlements:
      path: Captura/Captura.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.captura.app
        INFOPLIST_FILE: Captura/Info.plist
        CODE_SIGN_ENTITLEMENTS: Captura/Captura.entitlements
